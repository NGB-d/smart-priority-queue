<!DOCTYPE html>
<html lang="he">
<head>
    <title>SmartQueue Pro v3.0</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #2563eb; --error: #dc2626; }
        body { font-family: 'Segoe UI', sans-serif; background: #f1f5f9; direction: rtl; padding: 20px; }
        .main-card { max-width: 500px; margin: 0 auto; background: white; border-radius: 20px; padding: 30px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .error-toast { background: #fee2e2; color: var(--error); padding: 10px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #fecaca; display: flex; align-items: center; gap: 10px; animation: shake 0.4s; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        .input-group { display: flex; gap: 10px; margin-bottom: 20px; }
        input, select { flex: 1; padding: 12px; border: 1px solid #e2e8f0; border-radius: 10px; }
        .btn-add { background: var(--primary); color: white; border: none; padding: 12px 20px; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .item { padding: 15px; background: #f8fafc; border-radius: 12px; margin-bottom: 10px; border-right: 5px solid #2563eb; display: flex; justify-content: space-between; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        function App() {
            const [queue, setQueue] = React.useState([]);
            const [name, setName] = React.useState('');
            const [priority, setPriority] = React.useState('1');
            const [error, setError] = React.useState('');

            const fetchQueue = () => {
                fetch('http://localhost:3001/queue').then(res => res.json()).then(setQueue);
            };

            React.useEffect(() => { fetchQueue(); }, []);

            const addUser = () => {
                setError('');
                fetch('http://localhost:3001/queue', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, priority })
                })
                .then(async (res) => {
                    const data = await res.json();
                    if (!res.ok) throw new Error(data.error || "שגיאה");
                    setName('');
                    fetchQueue();
                })
                .catch(err => {
                    setError(err.message === "Invalid Name" ? "השם קצר מדי (מינימום 2 תווים)" : err.message);
                    setTimeout(() => setError(''), 3000);
                });
            };

            return (
                <div className="main-card">
                    <h2>🚀 ניהול תור חכם</h2>
                    
                    {error && (
                        <div className="error-toast">
                            <i className="fas fa-exclamation-circle"></i>
                            {error}
                        </div>
                    )}

                    <div className="input-group">
                        <input value={name} onChange={(e) => setName(e.target.value)} placeholder="שם הלקוח..." />
                        <select value={priority} onChange={(e) => setPriority(e.target.value)}>
                            <option value="1">רגיל</option>
                            <option value="3">בינוני</option>
                            <option value="5">דחוף</option>
                        </select>
                        <button className="btn-add" onClick={addUser}>הוסף</button>
                    </div>

                    <div className="list">
                        {queue.map((item, index) => (
                            <div key={index} className="item">
                                <strong>{item.name}</strong>
                                <span>#{index + 1}</span>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
