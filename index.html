<!DOCTYPE html>
<html lang="he">
<head>
    <title>SmartQueue Elite - Portfolio</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #2563eb; --urgent: #ef4444; --medium: #f59e0b; --low: #10b981; }
        body { font-family: 'Segoe UI', sans-serif; background: #f1f5f9; direction: rtl; padding: 20px; }
        .app-container { max-width: 700px; margin: 0 auto; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .stat-card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: center; }
        .stat-value { font-size: 24px; font-weight: bold; color: var(--primary); }
        .main-card { background: white; border-radius: 20px; padding: 30px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
        .input-group { display: flex; gap: 10px; margin-bottom: 20px; }
        input, select { flex: 1; padding: 12px; border: 1px solid #e2e8f0; border-radius: 10px; }
        .btn { padding: 12px 20px; border-radius: 10px; border: none; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-add { background: var(--primary); color: white; }
        .btn-next { background: #1e293b; color: white; width: 100%; margin: 10px 0; }
        .btn-reset { background: transparent; color: #94a3b8; font-size: 12px; text-decoration: underline; margin-top: 10px; width: 100%; }
        .item { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: #fff; border: 1px solid #f1f5f9; border-radius: 12px; margin-bottom: 10px; border-right: 6px solid #ddd; animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .p-5 { border-right-color: var(--urgent); }
        .p-3 { border-right-color: var(--medium); }
        .p-1 { border-right-color: var(--low); }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        function App() {
            const [queue, setQueue] = React.useState([]);
            const [name, setName] = React.useState('');
            const [priority, setPriority] = React.useState('1');

            const fetchQueue = () => {
                fetch('http://localhost:3001/queue').then(res => res.json()).then(setQueue);
            };

            React.useEffect(() => { fetchQueue(); }, []);

            const addUser = () => {
                if(!name) return;
                fetch('http://localhost:3001/queue', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, priority })
                }).then(() => { setName(''); fetchQueue(); });
            };

            const nextCustomer = () => {
                fetch('http://localhost:3001/queue', { method: 'DELETE' }).then(fetchQueue);
            };

            const resetQueue = () => {
                if(confirm("למחוק את כל התור?")) {
                    fetch('http://localhost:3001/queue/reset', { method: 'POST' }).then(fetchQueue);
                }
            };

            // לוגיקה אלגוריתמית: צבירת נתונים
            const totalWait = queue.length * 10;
            const loadStatus = queue.length > 5 ? "עמוס מאוד" : queue.length > 2 ? "בינוני" : "רגוע";

            return (
                <div className="app-container">
                    <div className="stats-grid">
                        <div className="stat-card">
                            <div style={{color: '#64748b'}}>אנשים בתור</div>
                            <div className="stat-value">{queue.length}</div>
                        </div>
                        <div className="stat-card">
                            <div style={{color: '#64748b'}}>זמן המתנה כולל</div>
                            <div className="stat-value">{totalWait} דק'</div>
                        </div>
                    </div>

                    <div className="main-card">
                        <h2 style={{marginTop: 0}}>🚀 SmartQueue Pro</h2>
                        <div className="input-group">
                            <input value={name} onChange={(e) => setName(e.target.value)} placeholder="שם הלקוח..." />
                            <select value={priority} onChange={(e) => setPriority(e.target.value)}>
                                <option value="1">רגיל (1)</option>
                                <option value="3">בינוני (3)</option>
                                <option value="5">דחוף (5)</option>
                            </select>
                            <button className="btn btn-add" onClick={addUser}>הוסף</button>
                        </div>

                        <button className="btn btn-next" onClick={nextCustomer}>
                            <i className="fas fa-play"></i> התחל טיפול בלקוח הבא
                        </button>

                        <div className="list">
                            {queue.map((item, index) => (
                                <div key={index} className={`item p-${item.priority}`}>
                                    <div>
                                        <div style={{fontWeight: 'bold'}}>{item.name}</div>
                                        <div style={{fontSize: '12px', color: '#94a3b8'}}>ממתין כ-{item.estimatedTime} דקות</div>
                                    </div>
                                    <div style={{fontSize: '14px', color: '#64748b'}}>#{index + 1}</div>
                                </div>
                            ))}
                        </div>

                        <button className="btn btn-reset" onClick={resetQueue}>איפוס כל המערכת</button>
                    </div>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
